<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
    <meta http-equiv="Pragma" content="no-cache"/>
    <meta http-equiv="Expires" content="0"/>
    <title>Sign In | Alert-Pro - Device Monitoring Dashboard</title>
    <meta name="description" content="Sign in to your Alert-Pro account to access real-time device monitoring, security alerts, and smart home security management dashboard."/>
    <meta name="robots" content="noindex, follow"/>
    <link rel="canonical" href="https://iot-security-platform.com/login"/>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"/>
    <link rel="stylesheet" href="/assets/app.css?v=9"/>
    <script defer src="/assets/app.js?v=11"></script>
    <script defer src="/assets/accessibility.js?v=1"></script>
  </head>
  <body>
    <a href="#main-content" class="skip-link" style="position: absolute; top: -40px; left: 0; background: var(--primary); color: white; padding: 8px 16px; text-decoration: none; z-index: 10000; border-radius: 0 0 4px 0;" onfocus="this.style.top='0'" onblur="this.style.top='-40px'">Skip to main content</a>
    
    <div class="wrap">
      <nav class="nav" role="navigation" aria-label="Main navigation">
        <div class="brand">
          <img src="/assets/logo.png" alt="Alert-Pro Logo" class="logo" />
          <div>
            <p>Sign in</p>
          </div>
        </div>
        <div class="row">
          <a class="btn" href="/" aria-label="Go to home page">Home</a>
          <a class="btn" href="/signup" aria-label="Create an account">Sign Up</a>
        </div>
      </nav>

      <main id="main-content" role="main" class="login-main">
        <div class="card login-card">
            <h2>Welcome back</h2>
            <p class="sub">Sign in to access your devices and alerts.</p>
            <form id="loginForm" aria-label="Sign in form" novalidate>
              <div class="field">
                <label for="email">Email</label>
                <input 
                  id="email" 
                  type="email" 
                  autocomplete="email" 
                  placeholder="you@example.com" 
                  required
                  aria-required="true"
                  aria-describedby="email-hint"
                />
                <div id="email-hint" class="sr-only">Enter your email address</div>
              </div>
              <div class="field">
                <label for="password">Password</label>
                <input 
                  id="password" 
                  type="password" 
                  autocomplete="current-password" 
                  placeholder="••••••••" 
                  required
                  aria-required="true"
                  aria-describedby="password-hint"
                />
                <div id="password-hint" class="sr-only">Enter your password</div>
              </div>
              <div class="field" id="mfaField" style="display: none;" aria-live="polite">
                <label for="mfaCode">MFA Code</label>
                <input 
                  id="mfaCode" 
                  type="text" 
                  inputmode="numeric" 
                  autocomplete="one-time-code" 
                  placeholder="123456"
                  aria-describedby="mfa-hint"
                  maxlength="6"
                />
                <div id="mfa-hint" class="hint">Enter the 6-digit code from your authenticator app.</div>
              </div>
            
              <div style="text-align: right; margin-top: 8px; margin-bottom: 16px;">
                <a href="/forgot-password" style="color: var(--primary); text-decoration: none; font-size: 14px; font-weight: 500;" aria-label="Reset your password">
                  Forgot password?
                </a>
              </div>
            
              <div class="row" style="margin-top:14px;">
                <button class="btn primary" type="submit" aria-label="Sign in to your account">Sign in</button>
                <span class="hint">Need an account? <a href="/signup" style="color: var(--primary); text-decoration: none;" aria-label="Create a new account">Sign up</a></span>
              </div>
              <div id="msg" class="msg" role="alert" aria-live="polite"></div>
            </form>
        </div>
      </main>
    </div>
    
    <div class="footer" style="text-align: center; padding: 20px;">
      <a href="/privacy" style="color: var(--primary); text-decoration: none; margin: 0 12px;">Privacy Policy</a>
      <span style="color: var(--muted);">•</span>
      <a href="/terms" style="color: var(--primary); text-decoration: none; margin: 0 12px;">Terms of Service</a>
    </div>
  </body>
</html>
