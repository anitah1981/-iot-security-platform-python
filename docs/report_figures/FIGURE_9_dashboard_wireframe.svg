<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="12">
  <rect width="640" height="400" fill="#e2e8f0"/>
