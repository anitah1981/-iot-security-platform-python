<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="11">
  <defs>
    <marker id="mr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><polygon points="0,0 6,3 0,6" fill="#475569"/></marker>
  </defs>
  <rect width="720" height="380" fill="#fafbfc"/>
  <text x="360" y="26" text-anchor="middle" font-size="14" font-weight="600" fill="#1e293b">High-level data / collections (MongoDB, conceptual)</text>

  <rect x="40" y="55" width="130" height="70" rx="6" fill="#dbeafe" stroke="#1d4ed8"/>
  <text x="105" y="82" text-anchor="middle" font-weight="700" fill="#1e3a8a">Users</text>
  <text x="105" y="100" text-anchor="middle" fill="#1e40af">credentials, roles</text>
  <text x="105" y="116" text-anchor="middle" fill="#1e40af">auth tokens</text>

  <rect x="220" y="55" width="150" height="86" rx="6" fill="#dcfce7" stroke="#15803d"/>
  <text x="295" y="82" text-anchor="middle" font-weight="700" fill="#14532d">Devices</text>
  <text x="295" y="100" text-anchor="middle" fill="#166534">owner, heartbeats</text>
  <text x="295" y="116" text-anchor="middle" fill="#166534">status, metadata</text>
  <text x="295" y="132" text-anchor="middle" fill="#166534">lastSeen</text>

  <rect x="420" y="55" width="130" height="70" rx="6" fill="#fee2e2" stroke="#b91c1c"/>
  <text x="485" y="82" text-anchor="middle" font-weight="700" fill="#7f1d1d">Alerts</text>
  <text x="485" y="100" text-anchor="middle" fill="#991b1b">device ref, severity</text>
  <text x="485" y="116" text-anchor="middle" fill="#991b1b">timestamps</text>

  <rect x="575" y="55" width="135" height="70" rx="6" fill="#fae8ff" stroke="#a21caf"/>
  <text x="642" y="78" text-anchor="middle" font-weight="700" fill="#701a75">Notify prefs</text>
  <text x="642" y="96" text-anchor="middle" fill="#86198f" font-size="10">channels, escalation</text>

  <rect x="180" y="200" width="360" height="72" rx="6" fill="#f1f5f9" stroke="#64748b"/>
  <text x="360" y="228" text-anchor="middle" font-weight="600" fill="#334155">Also in implementation (examples)</text>
  <text x="360" y="248" text-anchor="middle" fill="#475569" font-size="10">incidents, audit_logs, organisations (codebase; not all shown)</text>
  <text x="360" y="264" text-anchor="middle" fill="#475569" font-size="10">Keep conceptual in report for GDPR / NFR2</text>

  <path d="M 170 88 L 218 88" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#mr)"/>
  <text x="190" y="78" text-anchor="middle" fill="#64748b" font-size="9">1 to many</text>
  <path d="M 372 88 L 418 88" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#mr)"/>
  <path d="M 550 88 L 574 88" stroke="#475569" stroke-width="1.5" fill="none"/>
  <path d="M 295 141 L 295 175 L 105 175 L 105 125" stroke="#94a3b8" stroke-dasharray="4 3" fill="none"/>
  <text x="200" y="168" fill="#64748b" font-size="9">user owns devices</text>

  <text x="360" y="350" text-anchor="middle" fill="#94a3b8" font-size="10">Not a full ER; document store may embed fields differently.</text>
</svg>
