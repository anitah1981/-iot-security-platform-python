<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 320" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="12">
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><polygon points="0,0 7,3.5 0,7" fill="#334155"/></marker>
  </defs>
  <rect width="780" height="320" fill="#fafbfc"/>
  <text x="390" y="26" text-anchor="middle" font-size="15" font-weight="600" fill="#1e293b">Heartbeat: persist, sweep, status / alert (logical)</text>

  <rect x="30" y="55" width="110" height="48" rx="5" fill="#fef3c7" stroke="#b45309"/>
  <text x="85" y="84" text-anchor="middle" font-weight="600" fill="#78350f">Device</text>

  <rect x="190" y="55" width="130" height="48" rx="5" fill="#e0e7ff" stroke="#3730a3"/>
  <text x="255" y="78" text-anchor="middle" font-weight="600" fill="#1e1b4b">POST /heartbeat</text>
  <text x="255" y="94" text-anchor="middle" fill="#312e81" font-size="10">API validates + stores</text>

  <rect x="370" y="55" width="150" height="48" rx="5" fill="#dcfce7" stroke="#166534"/>
  <text x="445" y="78" text-anchor="middle" font-weight="600" fill="#14532d">MongoDB</text>
  <text x="445" y="94" text-anchor="middle" fill="#166534" font-size="10">lastSeen / device doc</text>

  <rect x="560" y="55" width="190" height="48" rx="5" fill="#fce7f3" stroke="#9d174d"/>
  <text x="655" y="78" text-anchor="middle" font-weight="600" fill="#831843">Background sweep</text>
  <text x="655" y="94" text-anchor="middle" fill="#9d174d" font-size="10">interval vs threshold</text>

  <path d="M 142 79 L 188 79" stroke="#334155" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <path d="M 322 79 L 368 79" stroke="#334155" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <path d="M 522 79 L 558 79" stroke="#334155" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <rect x="180" y="145" width="420" height="52" rx="6" fill="#fff" stroke="#64748b"/>
  <text x="390" y="168" text-anchor="middle" font-weight="600">Missed heartbeats past tolerance?</text>
  <text x="390" y="188" text-anchor="middle" fill="#475569" font-size="11">Yes: mark offline / degraded, anomaly hooks, alerts</text>

  <path d="M 655 103 L 655 128 L 390 128 L 390 145" stroke="#64748b" stroke-width="1.5" fill="none"/>
  <text x="520" y="122" text-anchor="middle" fill="#64748b" font-size="10">periodic check</text>

  <rect x="200" y="225" width="380" height="78" rx="6" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="390" y="252" text-anchor="middle" font-weight="600" fill="#334155">Outputs</text>
  <text x="390" y="272" text-anchor="middle" fill="#475569" font-size="11">Dashboard status; notifications (email / SMS / voice by severity)</text>
  <path d="M 390 197 L 390 220" stroke="#64748b" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
</svg>
