<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 340" font-family="Segoe UI, Arial, sans-serif" font-size="12">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <filter id="sh1" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="880" height="340" fill="url(#bg1)"/>

  <text x="440" y="20" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">
    <tspan x="440" dy="0">Figure 4.1: Expansion of the digital attack surface as IoT devices</tspan>
    <tspan x="440" dy="16">multiply in home and SMB environments.</tspan>
  </text>

  <rect x="20" y="52" width="840" height="200" rx="10" fill="#ffffff" stroke="#64748b" stroke-width="1.5" filter="url(#sh1)"/>
  <text x="36" y="74" font-weight="700" fill="#1e3a5f" font-size="13">IoT device types (heterogeneous)</text>

  <g font-size="10" fill="#334155">
    <rect x="32" y="88" width="92" height="40" rx="6" fill="#dbeafe" stroke="#3b82f6"/>
    <text x="78" y="111" text-anchor="middle">Cameras</text>
    <rect x="132" y="88" width="92" height="40" rx="6" fill="#dbeafe" stroke="#3b82f6"/>
    <text x="178" y="111" text-anchor="middle">Doorbells</text>
    <rect x="232" y="88" width="92" height="40" rx="6" fill="#dbeafe" stroke="#3b82f6"/>
    <text x="278" y="111" text-anchor="middle">Sensors</text>
    <rect x="332" y="88" width="92" height="40" rx="6" fill="#dbeafe" stroke="#3b82f6"/>
    <text x="378" y="111" text-anchor="middle">Health IoT</text>
    <rect x="432" y="88" width="92" height="40" rx="6" fill="#dbeafe" stroke="#3b82f6"/>
    <text x="478" y="111" text-anchor="middle">Hubs</text>
    <rect x="532" y="88" width="110" height="40" rx="6" fill="#dbeafe" stroke="#3b82f6"/>
    <text x="587" y="111" text-anchor="middle">SMB / industrial</text>
  </g>

  <path d="M 78 128 L 78 142 L 440 142 L 440 158" fill="none" stroke="#64748b" stroke-width="1.2"/>
  <path d="M 178 128 L 178 142 M 278 128 L 278 142 M 378 128 L 378 142 M 478 128 L 478 142 M 587 128 L 587 142" stroke="#64748b" stroke-width="1.2"/>

  <rect x="300" y="158" width="280" height="38" rx="8" fill="#fef3c7" stroke="#d97706"/>
  <text x="440" y="181" text-anchor="middle" font-weight="600" fill="#92400e">Wi-Fi / LAN / router</text>

  <path d="M 440 196 L 440 208" fill="none" stroke="#64748b" stroke-width="1.2"/>
  <rect x="200" y="208" width="200" height="40" rx="8" fill="#f1f5f9" stroke="#64748b"/>
  <text x="300" y="232" text-anchor="middle" fill="#334155">Vendor clouds / APIs</text>
  <rect x="480" y="208" width="200" height="40" rx="8" fill="#f1f5f9" stroke="#64748b"/>
  <text x="580" y="232" text-anchor="middle" fill="#334155">Users (limited IDS/SIEM)</text>
  <path d="M 440 196 L 300 208 M 440 196 L 580 208" fill="none" stroke="#94a3b8" stroke-width="1"/>

  <text x="440" y="302" text-anchor="middle" font-size="11" fill="#475569" font-style="italic">
    Aggregate attack surface grows with each device class sharing common network paths
  </text>
</svg>
